<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutureBook ⚡</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- ================= AUTH SCREEN ================= -->
<div id="authScreen">
  <h2>⚡ FutureBook</h2>

  <input id="nameInput" placeholder="Enter your name" />
  <input id="passwordInput" type="password" placeholder="Password" />

  <button onclick="signup()">Create Account</button>
  <button onclick="login()">Login</button>
</div>

<!-- ================= MAIN APP ================= -->
<div class="app" style="display:none;">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="logo">⚡ FutureBook</div>

    <div class="menu-item">🏠 Home</div>
    <div class="menu-item">👤 Profile</div>
    <div class="menu-item">💬 Messages</div>
    <div class="menu-item">🔔 Notifications</div>
    <div class="menu-item">⚙️ Settings</div>
  </div>

  <!-- CENTER -->
  <div class="feed">

    <div class="topbar">
      <input class="search" placeholder="Search FutureBook..." />
    </div>

    <div class="create-post">
      <input id="postInput" placeholder="What's on your mind?" />
      <button onclick="createPost()">Post</button>
    </div>

    <div id="posts"></div>

  </div>

  <!-- RIGHT (CHAT PANEL) -->
  <div class="rightbar" id="chatPanel">

    <h3>🟢 Online Users</h3>
    <div id="onlineUsers"></div>

    <hr>

    <h3 id="chatTitle">💬 Select a user</h3>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<!-- ================= MOBILE NAV ================= -->
<div class="mobile-nav">

  <button onclick="scrollToTop()">🏠</button>

  <button onclick="toggleChat()">💬</button>

  <button onclick="focusPost()">➕</button>

  <button onclick="alert('Profile coming')">👤</button>

  <button onclick="alert('Settings coming')">⚙️</button>

</div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
