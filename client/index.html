<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutureBook ⚡</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- AUTH -->
<div id="authScreen">
  <h2>⚡ FutureBook</h2>

 <input id="chatInput" placeholder="Type message..." oninput="handleTyping()" />
  <input id="passwordInput" type="password" placeholder="Password" />

  <button onclick="signup()">Create Account</button>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="app" style="display:none;">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="logo">⚡ FutureBook</div>

    <div class="menu-item">🏠 Home</div>
    <div class="menu-item">👤 Profile</div>
    <div class="menu-item">💬 Messages</div>
    <div class="menu-item">🔔 Notifications</div>
    <div class="menu-item">⚙️ Settings</div>
  </div>

  <!-- FEED -->
  <div class="feed">
    <div class="topbar">
      <input class="search" placeholder="Search FutureBook..." />
    </div>

    <div class="create-post">
      <input id="postInput" placeholder="What's on your mind?" />
      <button onclick="createPost()">Post</button>
    </div>

    <div id="posts"></div>
  </div>

  <!-- CHAT -->
  <div class="rightbar" id="chatPanel">

    <h3>🟢 Online Users</h3>
    <div id="onlineUsers"></div>

    <hr>

    <h3 id="chatTitle">💬 Select a user</h3>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>
</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <div onclick="showFeed()">🏠</div>
  <div onclick="toggleChat()">💬</div>
  <div onclick="logout()">🚪</div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="script.js"></script>

<!-- ================= FIXED SAFETY FUNCTIONS ================= -->
<script>
function showFeed() {
  document.querySelector(".feed").style.display = "block";
}

function logout() {
  localStorage.removeItem("fb_user");
  location.reload();
}
</script>

</body>
</html>
