<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutureBook</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="logo">⚡ FutureBook</div>

    <div class="menu-item">🏠 Home</div>
    <div class="menu-item">👤 Profile</div>
    <div class="menu-item">💬 Messages</div>
    <div class="menu-item">🔔 Notifications</div>
    <div class="menu-item">⚙️ Settings</div>
  </div>

  <!-- CENTER -->
  <div class="feed">

    <div class="topbar">
      <input class="search" placeholder="Search FutureBook..." />
    </div>

    <div class="create-post">
      <input id="postInput" placeholder="What's on your mind?" />
      <button onclick="createPost()">Post</button>
    </div>

    <div id="posts"></div>

  </div>

  <!-- RIGHT -->
  <div class="rightbar">
    <h3>🟢 Online</h3>
    <div id="onlineUsers"></div>
  </div>

</div>

<script src="script.js"></script>

<script>
function createPost() {
  const input = document.getElementById("postInput");
  const text = input.value.trim();

  if (!text) return;

  const post = document.createElement("div");
  post.className = "post";

  post.innerHTML = `
    <div class="post-user">You</div>
    <div class="post-text">${text}</div>
  `;

  document.getElementById("posts").prepend(post);

  input.value = "";
}
</script>

</body>
</html>
