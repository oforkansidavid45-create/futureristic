<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutureBook ⚡</title>

  <link rel="stylesheet" href="style.css"/>

  <!-- INLINE SAFE CHAT STYLING -->
  <style>
    .chat-box {
      height: 300px;
      overflow-y: auto;
      background: #111827;
      padding: 10px;
      border-radius: 10px;
    }

    .chat-msg {
      margin-bottom: 8px;
      color: white;
      word-break: break-word;
    }

    .online-user {
      cursor: pointer;
      padding: 6px;
      margin-bottom: 5px;
      border-radius: 6px;
      transition: 0.2s;
    }

    .online-user:hover {
      background: #1f2937;
    }

    .chat-input {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    #chatInput {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="logo">⚡ FutureBook</div>

    <div class="menu-item">🏠 Home</div>
    <div class="menu-item">👤 Profile</div>
    <div class="menu-item">💬 Messages</div>
    <div class="menu-item">🔔 Notifications</div>
    <div class="menu-item">⚙️ Settings</div>
  </div>

  <!-- CENTER -->
  <div class="feed">

    <div class="topbar">
      <input class="search" placeholder="Search FutureBook..." />
    </div>

    <div class="create-post">
      <input id="postInput" placeholder="What's on your mind?" />
      <button onclick="createPost()">Post</button>
    </div>

    <div id="posts"></div>

  </div>

  <!-- RIGHT -->
  <div class="rightbar">

    <h3>🟢 Online Users</h3>
    <div id="onlineUsers"></div>

    <hr>

    <h3 id="chatTitle">💬 Select a user</h3>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

  </div>

</div>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
