<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FutureBook ⚡</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <div class="logo">⚡ FutureBook</div>

    <div class="menu-item">🏠 Home</div>
    <div class="menu-item">👤 Profile</div>
    <div class="menu-item">💬 Messages</div>
    <div class="menu-item">🔔 Notifications</div>
    <div class="menu-item">⚙️ Settings</div>

    <!-- CHAT ROOMS -->
    <hr>
    <div class="menu-item" onclick="joinRoom('general')">💬 General</div>
    <div class="menu-item" onclick="joinRoom('tech')">💻 Tech</div>
    <div class="menu-item" onclick="joinRoom('games')">🎮 Games</div>
  </div>

  <!-- CENTER -->
  <div class="feed">

    <div class="topbar">
      <input class="search" placeholder="Search FutureBook..." />
    </div>

    <div class="create-post">
      <input id="postInput" placeholder="What's on your mind?" />
      <button onclick="createPost()">Post</button>
    </div>

    <!-- POSTS -->
    <div id="posts"></div>

  </div>

  <!-- RIGHT -->
  <div class="rightbar">
    <h3>🟢 Online</h3>
    <div id="onlineUsers"></div>

    <!-- CHAT BOX -->
    <hr>
    <h3>💬 Live Chat</h3>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<!-- SOCKET.IO (IMPORTANT) -->
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<!-- YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
